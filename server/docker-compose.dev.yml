version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go_backend

    ports:
      - "8080:8080"

    environment:
      DATABASE_URL: postgresql://myuser:mypassword@postgres:5432/mydatabase
      PYTHON_URL: http://python_service:8000

    depends_on:
      - postgres
      - python_service

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped

    networks:
      - app_network


  postgres:
    image: postgres:17-alpine
    container_name: cur_dev_db

    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

    networks:
      - app_network


  python_service:
    build:
      context: ../python
      dockerfile: Dockerfile.prod
    container_name: python_service

    ports:
      - "8000:8000"

    env_file:
      - ../python/app/.env

    environment:
      - DATABASE_URL=postgresql://myuser:mypassword@postgres:5432/mydatabase

    depends_on:
      - postgres

    restart: unless-stopped

    networks:
      - app_network


volumes:
  postgres_data:


networks:
  app_network: